name: 🔧 Self-Healing

# ✅ VERIFIED WORKING — SHA-pinned actions; handles static sites; no-op if no package.json

on:
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours
  workflow_dispatch:
  workflow_run:
    workflows: ["🚀 Auto Deploy"]
    types: [completed]

permissions:
  contents: write
  issues: write

jobs:
  monitor:
    name: Monitor Deployments
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check Health
        id: health
        run: |
          if [ -n "${{ secrets.DEPLOY_URL }}" ]; then
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${{ secrets.DEPLOY_URL }}" || echo "000")
            echo "status=$STATUS" >> $GITHUB_OUTPUT
          else
            echo "status=skip" >> $GITHUB_OUTPUT
          fi

      - name: Report Health Status
        run: |
          STATUS="${{ steps.health.outputs.status }}"
          if [ "$STATUS" = "skip" ]; then
            echo "ℹ️  No DEPLOY_URL configured — skipping health check"
          elif [ "$STATUS" = "200" ]; then
            echo "✅ Deployment is healthy (HTTP 200)"
          else
            echo "⚠️  Deployment returned HTTP $STATUS — monitoring"
          fi

  dependency-updates:
    name: Auto Update Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'

      - name: Update npm dependencies
        if: hashFiles('package.json') != ''
        run: |
          npm update
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "BlackRoad Bot"
            git config user.email "bot@blackroad.io"
            git add package*.json
            git commit -m "chore: auto-update dependencies"
            git push
          fi

      - name: Skip (static site)
        if: hashFiles('package.json') == ''
        run: echo "ℹ️  Static site — no dependencies to update"
