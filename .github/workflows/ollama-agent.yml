name: 🤖 Ollama Agent

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, edited]
  pull_request_review_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: write

jobs:
  ollama-respond:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.comment.body, '@copilot') ||
      contains(github.event.comment.body, '@lucidia') ||
      contains(github.event.comment.body, '@blackboxprogramming') ||
      contains(github.event.issue.body, '@copilot') ||
      contains(github.event.issue.body, '@lucidia') ||
      contains(github.event.issue.body, '@blackboxprogramming') ||
      contains(github.event.pull_request.body, '@copilot') ||
      contains(github.event.pull_request.body, '@lucidia') ||
      contains(github.event.pull_request.body, '@blackboxprogramming')

    steps:
      - name: Extract prompt
        id: extract
        run: |
          # Determine the message body that triggered this workflow
          if [ -n "${{ github.event.comment.body }}" ]; then
            BODY="${{ github.event.comment.body }}"
          elif [ -n "${{ github.event.issue.body }}" ]; then
            BODY="${{ github.event.issue.body }}"
          else
            BODY="${{ github.event.pull_request.body }}"
          fi

          # Strip @mention prefixes so only the prompt text reaches Ollama
          PROMPT=$(echo "$BODY" | sed 's/@copilot//g; s/@lucidia//g; s/@blackboxprogramming//g' | xargs)
          echo "prompt=$PROMPT" >> "$GITHUB_OUTPUT"

      - name: Query Ollama
        id: ollama
        env:
          OLLAMA_URL: ${{ secrets.OLLAMA_URL }}
          OLLAMA_MODEL: ${{ secrets.OLLAMA_MODEL || 'llama3' }}
          PROMPT: ${{ steps.extract.outputs.prompt }}
        run: |
          if [ -z "$OLLAMA_URL" ]; then
            echo "response=⚠️ OLLAMA_URL secret is not configured. Please set it to your Ollama endpoint (e.g. https://ollama.yourdomain.com)." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Write prompt to a temp file to avoid shell injection
          printf '%s' "$PROMPT" > /tmp/ollama_prompt.txt

          RESPONSE=$(python3 - <<'PYEOF'
import json, os, sys, urllib.request, urllib.error

url = os.environ["OLLAMA_URL"].rstrip("/") + "/api/generate"
model = os.environ.get("OLLAMA_MODEL", "llama3")

with open("/tmp/ollama_prompt.txt") as f:
    prompt = f.read()

payload = json.dumps({"model": model, "prompt": prompt, "stream": False}).encode()
req = urllib.request.Request(url, data=payload, headers={"Content-Type": "application/json"})
try:
    with urllib.request.urlopen(req, timeout=120) as resp:
        data = json.loads(resp.read())
        print(data.get("response", "(no response)"))
except Exception as e:
    print(f"(Ollama unreachable: {e})")
PYEOF
)

          # Escape for GitHub output (replace % and newlines)
          RESPONSE_ESCAPED="${RESPONSE//'%'/'%25'}"
          RESPONSE_ESCAPED="${RESPONSE_ESCAPED//$'\n'/'%0A'}"
          RESPONSE_ESCAPED="${RESPONSE_ESCAPED//$'\r'/'%0D'}"
          echo "response=$RESPONSE_ESCAPED" >> "$GITHUB_OUTPUT"

      - name: Post Ollama response as comment
        uses: actions/github-script@v7
        with:
          script: |
            const response = `${{ steps.ollama.outputs.response }}`;
            const body = `🤖 **Ollama** (local, no external AI)\n\n${response}`;

            const issueNumber =
              context.payload.issue?.number ??
              context.payload.pull_request?.number;

            if (issueNumber) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: body,
              });
            }
