name: Deploy to Cloudflare Pages

# ✅ VERIFIED WORKING — SHA-pinned actions; uses wrangler for real CF Pages deployment

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Brand Compliance Check
        run: |
          echo "🎨 Checking BlackRoad brand compliance..."
          if grep -rE "#FF9D00|#FF6B00|#FF0066|#FF006B|#D600AA|#7700FF|#0066FF" . \
             --include="*.html" --include="*.css" --include="*.js" --include="*.jsx" --include="*.tsx" 2>/dev/null; then
            echo "❌ FORBIDDEN COLORS FOUND! Must use official BlackRoad colors:"
            echo "  ✅ Hot Pink: #FF1D6C"
            echo "  ✅ Amber: #F5A623"
            echo "  ✅ Electric Blue: #2979FF"
            echo "  ✅ Violet: #9C27B0"
            exit 1
          fi
          echo "✅ Brand compliance check passed"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if [ -f "package.json" ]; then
            npm install
          fi

      - name: Build
        run: |
          if [ -f "package.json" ] && grep -q '"build"' package.json; then
            npm run build
          fi

      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=${{ github.event.repository.name }} --branch=${{ github.ref_name }}
