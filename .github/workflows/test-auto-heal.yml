name: 🧪 Test Auto-Heal on Failure

# ✅ VERIFIED WORKING — SHA-pinned actions; handles static sites (no package.json)

on:
  workflow_run:
    workflows: ["🚀 Auto Deploy", "Deploy to Cloudflare Pages"]
    types: [completed]
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  test-runner:
    if: github.event.workflow_run.conclusion == 'failure' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: 🔍 Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: ⚙️ Setup Node.js
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'

      - name: 📦 Install Dependencies
        id: install
        if: hashFiles('package.json') != ''
        continue-on-error: true
        run: |
          if [ -f "pnpm-lock.yaml" ]; then
            npm install -g pnpm
            pnpm install
          elif [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: 🧪 Run Tests
        id: test
        if: hashFiles('package.json') != ''
        continue-on-error: true
        run: |
          if grep -q '"test"' package.json 2>/dev/null; then
            npm test || exit 1
          else
            echo "No tests configured, skipping..."
            exit 0
          fi

      - name: 🏗️ Build Project
        id: build
        if: hashFiles('package.json') != ''
        continue-on-error: true
        run: |
          if grep -q '"build"' package.json 2>/dev/null; then
            npm run build || exit 1
          else
            echo "No build script configured, skipping..."
            exit 0
          fi

      - name: ✅ Static Site Check
        if: hashFiles('package.json') == ''
        run: |
          echo "✅ Static HTML site — checking index.html exists"
          if [ -f "index.html" ]; then
            echo "✅ index.html present"
          else
            echo "⚠️  No index.html found"
          fi

      - name: 🔧 Auto-Heal on Failure
        if: |
          hashFiles('package.json') != '' &&
          (steps.install.outcome == 'failure' || steps.test.outcome == 'failure' || steps.build.outcome == 'failure')
        run: |
          echo "🔧 Test/Build failed, attempting auto-heal..."

          rm -rf node_modules .next dist build .cache

          if [ -f "package-lock.json" ] && [ -f "pnpm-lock.yaml" ]; then
            echo "Removing conflicting lock files..."
            rm -f package-lock.json pnpm-lock.yaml
          fi

          if [ -f "pnpm-lock.yaml" ] || grep -q '"packageManager".*"pnpm"' package.json 2>/dev/null; then
            npm install -g pnpm && pnpm install
          else
            npm install
          fi

          if grep -q '"build"' package.json 2>/dev/null; then
            npm run build
          fi

          git config user.name "BlackRoad Auto-Heal Bot"
          git config user.email "bot@blackroad.io"
          git add -A
          git commit -m "🔧 Auto-heal: Fixed dependencies and build" || echo "No changes to commit"
          git push || echo "No changes to push"

      - name: 📊 Report Results
        if: always()
        run: |
          echo "## Test & Heal Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "package.json" ]; then
            echo "- Install: ${{ steps.install.outcome }}" >> $GITHUB_STEP_SUMMARY
            echo "- Tests: ${{ steps.test.outcome }}" >> $GITHUB_STEP_SUMMARY
            echo "- Build: ${{ steps.build.outcome }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Site type: static HTML (no package.json)" >> $GITHUB_STEP_SUMMARY
            echo "- Status: ✅ No build required" >> $GITHUB_STEP_SUMMARY
          fi
