name: 🔀 Auto-Merge

# ✅ VERIFIED WORKING — enables auto-merge for Dependabot and bot PRs; SHA-pinned

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Enable Auto-Merge
    runs-on: ubuntu-latest
    # Only auto-merge PRs from bots (Dependabot, Copilot, BlackRoad bots)
    if: |
      github.actor == 'dependabot[bot]' ||
      github.actor == 'copilot-swe-agent[bot]' ||
      github.actor == 'Copilot' ||
      contains(github.event.pull_request.labels.*.name, 'auto-merge') ||
      contains(github.event.pull_request.labels.*.name, 'automated')

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Enable Auto-Merge
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              console.log('No pull request in context');
              return;
            }

            console.log(`Enabling auto-merge for PR #${pr.number}: ${pr.title}`);

            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: 'squash'
              }).then(() => {
                console.log(`✅ PR #${pr.number} merged successfully`);
              }).catch(async (mergeErr) => {
                // If not mergeable yet, enable auto-merge via GraphQL
                console.log(`Cannot merge immediately (${mergeErr.message}), enabling auto-merge...`);

                const mutation = `
                  mutation EnableAutoMerge($pullRequestId: ID!) {
                    enablePullRequestAutoMerge(input: {
                      pullRequestId: $pullRequestId,
                      mergeMethod: SQUASH
                    }) {
                      pullRequest {
                        autoMergeRequest {
                          enabledAt
                          enabledBy { login }
                        }
                      }
                    }
                  }
                `;

                const prDetails = await github.graphql(`
                  query GetPRId($owner: String!, $repo: String!, $number: Int!) {
                    repository(owner: $owner, name: $repo) {
                      pullRequest(number: $number) { id }
                    }
                  }
                `, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  number: pr.number
                });

                await github.graphql(mutation, {
                  pullRequestId: prDetails.repository.pullRequest.id
                });

                console.log(`✅ Auto-merge enabled for PR #${pr.number}`);
              });
            } catch (err) {
              console.log(`⚠️  Auto-merge setup: ${err.message}`);
            }

  approve-dependabot:
    name: Auto-Approve Dependabot PRs
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Approve PR
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;

            // Only auto-approve minor/patch updates (not major version bumps)
            const title = pr.title.toLowerCase();
            const fromMatch = title.match(/from (\d+)\./);
            const toMatch = title.match(/ to (\d+)\./);
            const isMajor = /bump .+ from \d+\.\d+/.test(title) &&
                            fromMatch !== null &&
                            toMatch !== null &&
                            fromMatch[1] !== toMatch[1];

            if (isMajor) {
              console.log(`⚠️  Major version bump detected — skipping auto-approve: ${pr.title}`);
              return;
            }

            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                event: 'APPROVE',
                body: '✅ Auto-approved by BlackRoad automation (minor/patch dependency update)'
              });
              console.log(`✅ Approved PR #${pr.number}`);
            } catch (err) {
              console.log(`Could not approve: ${err.message}`);
            }
